blockExoticSubdeps: true

# Block packages published less than 7 days ago (supply chain protection)
minimumReleaseAge: 10080
resolutionMode: time-based

minimumReleaseAgeExclude:
  - "@chenglou/pretext"  # 0.0.5 needed for rich-inline; remove after Apr 16
#
# trustPolicy: no-downgrade — disabled; too many transitive deps lost
# provenance on recent releases. Re-enable when ecosystem stabilizes.
